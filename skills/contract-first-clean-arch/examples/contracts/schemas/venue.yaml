# Venue value object — describes a physical location where events
# take place. Venues are referenced by events and provide the
# structural data (sections, rows, seats) used to generate tickets.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: venue

type: object
properties:

  id:
    $ref: "common.yaml#/$defs/UUID"

  name:
    type: string
    minLength: 1
    description: "Official venue name (e.g. 'Royal Albert Hall')."

  address:
    type: string
    description: "Full postal address for navigation and legal purposes."

  totalCapacity:
    type: integer
    minimum: 1
    description: "Maximum attendees when all sections are open."

  # Sections define the physical layout. For a simple flat-floor
  # venue a single section is enough; large theaters may have many.
  sections:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
          description: "Section identifier shown on tickets (e.g. 'Orchestra')."
        rows:
          type: integer
          minimum: 1
          description: "Number of rows in this section."
        seatsPerRow:
          type: integer
          minimum: 1
          description: "Seats in each row (assumes uniform rows)."
      required: [ name, rows, seatsPerRow ]
    description: "Optional breakdown of the venue into named sections."

required: [ id, name, address, totalCapacity ]
