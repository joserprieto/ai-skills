[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    -v
markers =
    integration: tests that require external dependencies (docling, pdfminer.six, real PDFs)
    network: tests that hit CENDOJ servers (require network + may be rate-limited)
